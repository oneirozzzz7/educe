# Shell Taxonomy — 声明式分类配置
# 引擎用统一匹配机制消费此表，不依赖任何具体值。
# 修改此文件即可扩展/调整 shell 子分类，无需改引擎代码。
#
# match 类型说明：
#   head              — 命令头精确匹配
#   head_and_contains — 命令头匹配 + 全文包含任一关键词
#   head_or_contains  — 命令头匹配 或 全文包含任一关键词
#   head_not_contains — 命令头匹配 且 全文不包含指定内容
#   full_contains_any — 全文包含任一值

git:
  match: head
  values: [git]

test:
  match: head_and_contains
  values: [pytest, jest]
  contains: [test]
  alt_heads: [npm, yarn, pnpm, cargo, go]

build:
  match: head_or_contains
  values: [make, cargo, go, tsc, webpack, vite]
  alt_heads: [npm, yarn, pnpm]
  contains: [build]

serve:
  match: full_contains_any
  values: [uvicorn, nohup, gunicorn, "flask run", "npm start", "npm run dev"]

heredoc:
  match: full_contains_any
  values: [EOF]

pkg:
  match: head_and_contains
  values: [pip, pip3, npm, yarn, pnpm, apt, brew, cargo]
  contains: [install, add, uninstall]

search:
  match: head
  values: [grep, rg, ag, find, fd, ack]

read:
  match: head_not_contains
  values: [cat, less, head, tail, bat, sed, awk]
  not_contains: [">"]

nav:
  match: head
  values: [ls, cd, pwd, tree, stat, du, wc]

mutate:
  match: head
  values: [mv, cp, rm, mkdir, touch, chmod, ln]

write:
  match: head_and_contains
  values: [echo, sed, tee]
  contains: [">", "-i"]
  alt_heads: [cat, echo]

net:
  match: head
  values: [curl, wget, ssh, scp, docker, kubectl]

proc:
  match: head
  values: [ps, kill, top, systemctl, service, pkill, lsof]

python:
  match: head
  values: [python, python3]

node:
  match: head
  values: [node, npx, tsx]

open:
  match: head
  values: [open, xdg-open]

source:
  match: head_or_contains
  values: [source, "."]
  contains: [activate]

sysinfo:
  match: head
  values: [df, free, top, uptime, uname, hostname, sysctl, vm_stat,
           system_profiler, diskutil, lscpu, lsblk, ifconfig, ip, mount]

util:
  match: head
  values: [which, whereis, type, file, readlink, basename, dirname,
           realpath, date, cal, env, printenv, id, whoami]
