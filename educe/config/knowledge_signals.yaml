# 知识蒸馏与领域检测 — 声明式配置
# 引擎持有匹配机制，具体领域关键词来自此声明。
# 修改此文件即可适应不同语言/领域环境。

# 知识性表达检测：含这些词的句子被认为有分析价值
insight_markers:
  - 本质
  - 核心
  - 关键
  - 原理
  - 根本
  - 因为
  - 所以
  - 这意味着
  - 区别在于
  - 值得注意

