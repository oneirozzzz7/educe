# 多轮对话 — 验证模型能执行多步任务并基于中间结果推理
# 场景：创建文件 → 读取验证 → 修改 → 确认修改结果

scenario: multi_turn_dialogue
description: "验证多轮 action loop：模型执行多步任务（写文件→读→改→验证），每步基于上步结果"

setup:
  ensure_files: []  # 从头开始，让模型自己创建

steps:
  - name: "complex_task_request"
    description: "发送需要多步执行的复合任务"
    action:
      type: "send_message"
      text: "帮我做3件事：1) 创建文件 /tmp/educe_multi_test.txt 写入 'version=1.0' 2) 读取这个文件确认内容 3) 把 version 改成 2.0。每步都告诉我结果。"
    verify:
      ui:
        - { user_bubble_contains: "educe_multi_test", description: "用户消息正确" }

  - name: "wait_multi_turn_complete"
    description: "等待多轮执行完成（自动确认 action）"
    action:
      type: "auto_confirm_loop"
      timeout: 60
    verify:
      ui:
        - { action_lines_visible: 1, description: "至少1个 action 行显示" }
        - { status_idle: true, description: "状态回到 Idle" }
      logic:
        - { not_empty: true, description: "有可见内容" }
      logs:
        - { action_count_gte: 1, description: "至少执行了1个 action" }

  - name: "verify_file_actually_modified"
    description: "验证文件真的被修改了（不是模型幻觉）"
    action:
      type: "send_message"
      text: "读取 /tmp/educe_multi_test.txt 的内容，只告诉我文件内容"
    verify: {}

  - name: "wait_verify_result"
    description: "等待读取验证结果"
    action:
      type: "auto_confirm_loop"
      timeout: 20
    verify:
      logic:
        - { contains_any: ["2.0", "version=2.0"], description: "文件内容含 2.0" }
