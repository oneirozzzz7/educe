# Educe test framework config

models:
  # Test runner (fast, accurate)
  test_runner:
    # Configure via env: EDUCE_BASE_URL, EDUCE_API_KEY, EDUCE_MODEL
    base_url: ""
    model: "deepseek-chat"
    format: "openai"

  # Judge scoring (high quality)
  judge:
    # Configure via env: EDUCE_JUDGE_BASE_URL, EDUCE_JUDGE_API_KEY
    base_url: ""
    model: "claude-sonnet-4-6"
    format: "anthropic"

endpoints:
  backend: "http://localhost:7860"
  frontend: "http://localhost:3000"
  ws: "ws://localhost:7860/ws"

timeouts:
  action_reply: 15
  ui_render: 5

default_verifiers:
  - logic
  - ui
  - logs
  - pipeline

full_only_verifiers:
  - aesthetic
  - observability
