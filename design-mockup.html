<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educe — Interactive Prototype v3</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void:        #0a0a0c;
  --surface-0:   #0f0f12;
  --surface-1:   #141418;
  --surface-2:   #1a1a1f;
  --surface-3:   #222228;
  --border-0:    #1e1e24;
  --border-1:    #2a2a32;
  --border-2:    #3a3a44;
  --text-0:      #f0ede8;
  --text-1:      #c8c4bc;
  --text-2:      #8a8680;
  --text-3:      #5a5854;
  --amber:       #d4944c;
  --amber-bright:#e8a85c;
  --amber-dim:   rgba(212, 148, 76, 0.10);
  --amber-glow:  rgba(212, 148, 76, 0.06);
  --sage:        #7a9e7e;
  --sage-dim:    rgba(122, 158, 126, 0.12);
  --pass:        #6ec87a;
  --pass-dim:    rgba(110, 200, 122, 0.10);
  --fail:        #d4645c;
  --fail-dim:    rgba(212, 100, 92, 0.10);
  --radius-s:    6px;
  --radius-m:    10px;
  --radius-l:    14px;
  --font:        'Geist', -apple-system, system-ui, sans-serif;
  --font-d:      'Instrument Serif', Georgia, serif;
  --font-m:      'Geist Mono', 'SF Mono', monospace;
  --font-cjk:    'Noto Sans SC', 'PingFang SC', sans-serif;
  --sidebar-w:   232px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--void);
  color: var(--text-0);
  -webkit-font-smoothing: antialiased;
  height: 100vh; overflow: hidden;
}
body[data-lang="zh"] { font-family: var(--font-cjk), var(--font); }
::selection { background: var(--amber-dim); color: var(--amber-bright); }

/* Noise */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 99999;
  opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px;
}

/* ============ LAYOUT ============ */
.app { display: flex; height: 100vh; }

/* ============ SIDEBAR ============ */
.sidebar {
  width: var(--sidebar-w); background: var(--surface-0);
  border-right: 1px solid var(--border-0);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sb-brand {
  padding: 20px 18px 22px;
  display: flex; align-items: baseline;
}
.sb-brand .mark {
  font-family: var(--font-d); font-size: 23px;
  color: var(--text-0); letter-spacing: -0.02em;
}
.sb-brand .mark .e { color: var(--amber); }
.sb-brand .tag {
  font-size: 9px; color: var(--text-3); margin-left: 9px;
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
}

.sb-new {
  margin: 0 10px 16px; padding: 8px 12px;
  background: var(--surface-2); border: 1px solid var(--border-1);
  border-radius: var(--radius-m); color: var(--text-1);
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 7px;
}
.sb-new:hover { border-color: var(--amber); color: var(--text-0); }
.sb-new .plus {
  width: 17px; height: 17px; border-radius: 5px;
  background: var(--amber-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--amber); font-weight: 600;
}

.sb-section {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-3); padding: 0 18px; margin-bottom: 6px; font-weight: 500;
}
.sb-list { flex: 1; overflow-y: auto; padding: 0 6px; }
.sb-item {
  padding: 8px 12px; border-radius: var(--radius-s);
  font-size: 13px; color: var(--text-2); cursor: pointer;
  margin-bottom: 1px; transition: all 0.15s;
  display: flex; flex-direction: column; gap: 2px;
}
.sb-item:hover { background: var(--surface-1); color: var(--text-1); }
.sb-item.active {
  background: var(--amber-glow); color: var(--text-0);
  border-left: 2px solid var(--amber); padding-left: 10px;
}
.sb-item .time { font-size: 10px; color: var(--text-3); }

.sb-bottom { padding: 10px; border-top: 1px solid var(--border-0); }
.sb-model {
  font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
}
.sb-model .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--pass); box-shadow: 0 0 6px var(--pass-dim);
}

/* ============ CANVAS (main area) ============ */
.canvas {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; position: relative; overflow: hidden;
}

/* ============ PHASE: EMPTY ============ */
.phase-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 40px; position: relative;
  transition: opacity 0.4s, transform 0.4s;
}
.phase-empty.leaving {
  opacity: 0; transform: translateY(-30px);
  pointer-events: none;
}
.phase-empty::before {
  content: ''; position: absolute;
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  width: 500px; height: 350px;
  background: radial-gradient(ellipse, var(--amber-glow) 0%, transparent 70%);
  pointer-events: none;
}

.sigil {
  width: 72px; height: 72px; margin-bottom: 32px;
  position: relative; z-index: 1;
}
.sigil svg { width: 100%; height: 100%; }
.sigil .r1 { fill: none; stroke: var(--border-1); stroke-width: 0.5; }
.sigil .r2 { fill: none; stroke: var(--border-1); stroke-width: 0.5; }
.sigil .a1 {
  fill: none; stroke: var(--amber); stroke-width: 1.5;
  stroke-linecap: round; stroke-dasharray: 55 150;
  animation: spin 10s linear infinite; transform-origin: center;
}
.sigil .a2 {
  fill: none; stroke: var(--amber-bright); stroke-width: 0.8;
  stroke-linecap: round; stroke-dasharray: 35 170;
  animation: spin-r 14s linear infinite; transform-origin: center; opacity: 0.4;
}
.sigil .core { fill: var(--amber); opacity: 0.6; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-r { to { transform: rotate(-360deg); } }

.empty-title {
  font-family: var(--font-d); font-size: 32px;
  color: var(--text-0); margin-bottom: 8px; z-index: 1;
}
.empty-sub {
  font-size: 14px; color: var(--text-3);
  margin-bottom: 36px; text-align: center; z-index: 1;
}

.input-wrap {
  width: 100%; max-width: 540px;
  position: relative; z-index: 1;
}
.input-main {
  width: 100%; background: var(--surface-1);
  border: 1px solid var(--border-1); border-radius: var(--radius-l);
  padding: 14px 52px 14px 18px; font-size: 15px;
  font-family: inherit; color: var(--text-0);
  outline: none; resize: none; min-height: 52px;
  transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.5;
}
.input-main::placeholder { color: var(--text-3); }
.input-main:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-dim), 0 8px 24px rgba(0,0,0,0.2);
}
.send-btn {
  position: absolute; right: 7px; bottom: 8px;
  width: 36px; height: 36px; border-radius: var(--radius-m);
  border: none; background: var(--amber); color: var(--void);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.send-btn:hover { opacity: 0.9; transform: scale(1.04); }
.send-btn svg { width: 15px; height: 15px; }

.starters {
  display: flex; flex-wrap: wrap; gap: 7px;
  justify-content: center; margin-top: 18px;
  max-width: 540px; z-index: 1;
}
.starter {
  padding: 6px 14px; border-radius: 100px;
  font-size: 12px; font-family: inherit;
  color: var(--text-2); background: none;
  border: 1px solid var(--border-1);
  cursor: pointer; transition: all 0.2s;
}
.starter:hover {
  border-color: var(--amber); color: var(--text-0);
  background: var(--amber-glow);
}

/* ============ PHASE: BUILDING ============ */
.phase-build {
  flex: 1; display: none; flex-direction: column;
  min-height: 0; opacity: 0;
  transition: opacity 0.5s;
}
.phase-build.active { display: flex; opacity: 1; }

/* Brief bar */
.brief-bar {
  padding: 10px 20px; background: var(--surface-0);
  border-bottom: 1px solid var(--border-0);
  display: flex; align-items: center; gap: 10px;
}
.brief-tag {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--amber); font-weight: 600;
  padding: 3px 7px; background: var(--amber-dim); border-radius: 4px;
}
.brief-text { font-size: 13px; color: var(--text-1); flex: 1; }
.brief-timer {
  font-size: 12px; color: var(--amber);
  font-family: var(--font-m); font-variant-numeric: tabular-nums;
}

/* Canvas body — preview is primary */
.canvas-body {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; position: relative;
}

/* Preview area — the star of the show */
.preview-area {
  flex: 1; position: relative; overflow: hidden;
  background: var(--surface-0);
}

/* Skeleton / loading state in preview */
.preview-skeleton {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s;
}
.preview-skeleton.hidden { opacity: 0; pointer-events: none; }

.skeleton-shape {
  background: var(--surface-2);
  border-radius: var(--radius-m);
  animation: skeleton-pulse 2s ease-in-out infinite;
}
@keyframes skeleton-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* Actual preview content */
.preview-live {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 1s ease;
}
.preview-live.visible { opacity: 1; }
.preview-live iframe {
  width: 100%; height: 100%; border: none;
}

/* Game preview mockup */
.game-preview {
  width: 100%; height: 100%;
  background: #0a0a0c;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
}
.game-title {
  font-family: var(--font-m); font-size: 28px;
  color: var(--amber-bright); letter-spacing: 6px; font-weight: 700;
}
.game-controls {
  font-family: var(--font-m); font-size: 11px; color: #444;
}
.game-screen {
  width: 320px; height: 220px;
  border: 1px solid #1a1a1a; border-radius: 4px;
  position: relative; overflow: hidden;
  background: #050508;
}
.game-ground {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 44px;
  background: linear-gradient(to bottom, #1a3a1a, #0d200d);
}
.game-player {
  position: absolute; bottom: 44px; left: 65px;
  width: 18px; height: 30px;
  background: var(--amber); border-radius: 2px;
  box-shadow: 0 0 8px rgba(212,148,76,0.3);
}
.game-enemy {
  position: absolute; bottom: 44px; right: 70px;
  width: 16px; height: 16px;
  background: var(--fail); border-radius: 2px;
}
.game-bullet {
  position: absolute; bottom: 56px; left: 88px;
  width: 22px; height: 2px;
  background: #e8e8e8;
  box-shadow: 0 0 4px rgba(255,255,255,0.3);
}
.game-hud-left {
  position: absolute; top: 8px; left: 12px;
  font-family: var(--font-m); font-size: 10px; color: var(--sage);
}
.game-hud-right {
  position: absolute; top: 8px; right: 12px;
  font-family: var(--font-m); font-size: 10px; color: var(--fail);
}
/* Stars in background */
.game-star {
  position: absolute; width: 1px; height: 1px;
  background: #444; border-radius: 50%;
}

/* Process strip — minimal, at bottom of preview */
.process-strip {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(10,10,12,0.95) 40%);
  padding: 40px 24px 16px;
  display: flex; flex-direction: column; gap: 8px;
  transition: transform 0.3s;
}
.process-strip.collapsed { transform: translateY(calc(100% - 40px)); }

/* Progress steps — human readable */
.progress-steps {
  display: flex; align-items: center; gap: 0;
}
.p-step {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-3);
  transition: color 0.3s;
}
.p-step.active { color: var(--text-0); }
.p-step.done { color: var(--text-2); }
.p-step .p-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border-2); transition: all 0.3s;
}
.p-step.active .p-dot {
  background: var(--amber);
  box-shadow: 0 0 8px var(--amber-dim);
  animation: p-pulse 1.5s ease-in-out infinite;
}
.p-step.done .p-dot { background: var(--pass); }
@keyframes p-pulse {
  50% { box-shadow: 0 0 12px var(--amber-dim); }
}
.p-arrow {
  width: 20px; text-align: center;
  color: var(--border-2); font-size: 10px;
}

/* Activity log — expandable detail */
.activity-toggle {
  font-size: 11px; color: var(--text-3);
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  padding: 4px 0; transition: color 0.15s;
  user-select: none;
}
.activity-toggle:hover { color: var(--text-2); }
.activity-toggle .arrow {
  display: inline-block; transition: transform 0.2s;
  font-size: 9px;
}
.activity-toggle.open .arrow { transform: rotate(90deg); }

.activity-log {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
}
.activity-log.open { max-height: 300px; overflow-y: auto; }

.log-item {
  display: flex; gap: 8px; padding: 3px 0;
  font-size: 11px; color: var(--text-2);
  animation: log-in 0.2s ease;
}
@keyframes log-in {
  from { opacity: 0; transform: translateX(-4px); }
}
.log-item .log-icon { width: 14px; text-align: center; flex-shrink: 0; }
.log-item .log-text { flex: 1; }
.log-item code {
  font-family: var(--font-m); font-size: 10px;
  background: var(--surface-3); padding: 0 4px; border-radius: 3px;
  color: var(--text-1);
}
.log-item .log-result {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
}
.log-item .log-result.ok { background: var(--pass-dim); color: var(--pass); }
.log-item .log-result.err { background: var(--fail-dim); color: var(--fail); }

/* ============ PHASE: COMPLETE ============ */
.complete-bar {
  display: none; padding: 10px 20px;
  background: var(--surface-0);
  border-top: 1px solid var(--border-0);
  align-items: center; gap: 12px;
}
.complete-bar.active { display: flex; }

.complete-badge {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--pass-dim); color: var(--pass);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.complete-info { flex: 1; }
.complete-info .name {
  font-size: 13px; font-weight: 600; color: var(--text-0);
  font-family: var(--font-m);
}
.complete-info .meta {
  font-size: 11px; color: var(--text-3);
  display: flex; gap: 10px; margin-top: 1px;
}
.complete-actions { display: flex; gap: 5px; }
.c-btn {
  padding: 6px 12px; border-radius: var(--radius-s);
  font-size: 11px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border-1); background: none;
  color: var(--text-1); cursor: pointer; transition: all 0.15s;
}
.c-btn:hover { border-color: var(--border-2); background: var(--surface-2); }
.c-btn.primary { background: var(--amber); border-color: var(--amber); color: var(--void); }

/* ============ DECISION OVERLAY ============ */
.decision-overlay {
  position: absolute; inset: 0;
  background: rgba(10,10,12,0.8);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  z-index: 20;
  animation: fade-in 0.3s ease;
}
.decision-overlay.active { display: flex; }
@keyframes fade-in { from { opacity: 0; } }

.dc-card {
  background: var(--surface-1); border: 1px solid var(--border-1);
  border-radius: var(--radius-l); padding: 24px 28px;
  max-width: 480px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: dc-up 0.3s ease;
}
@keyframes dc-up {
  from { opacity: 0; transform: translateY(12px); }
}
.dc-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.dc-card .dc-sub { font-size: 12px; color: var(--text-2); margin-bottom: 20px; }
.dc-group { margin-bottom: 14px; }
.dc-label {
  font-size: 10px; font-weight: 600; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.dc-opts { display: flex; flex-wrap: wrap; gap: 5px; }
.dc-opt {
  padding: 7px 14px; border-radius: var(--radius-s);
  font-size: 12px; font-family: inherit;
  border: 1px solid var(--border-1); background: none;
  color: var(--text-2); cursor: pointer; transition: all 0.15s;
}
.dc-opt:hover { border-color: var(--text-3); color: var(--text-0); }
.dc-opt.sel { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.dc-btns { margin-top: 18px; display: flex; gap: 8px; }
.dc-primary {
  padding: 8px 20px; border-radius: var(--radius-s);
  font-size: 12px; font-weight: 600; border: none;
  background: var(--amber); color: var(--void);
  cursor: pointer; font-family: inherit; transition: opacity 0.15s;
}
.dc-primary:hover { opacity: 0.9; }
.dc-ghost {
  padding: 8px 14px; border-radius: var(--radius-s);
  font-size: 12px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-family: inherit;
}

/* ============ BOTTOM INPUT (follow-up) ============ */
.bottom-input {
  padding: 10px 20px 14px;
  background: var(--surface-0);
  border-top: 1px solid var(--border-0);
  display: none;
}
.bottom-input.active { display: block; }
.bi-wrap { position: relative; }
.bi-field {
  width: 100%; background: var(--surface-1);
  border: 1px solid var(--border-1); border-radius: var(--radius-m);
  padding: 9px 40px 9px 14px; font-size: 13px;
  font-family: inherit; color: var(--text-0); outline: none;
  transition: border-color 0.2s;
}
.bi-field::placeholder { color: var(--text-3); }
.bi-field:focus { border-color: var(--amber); }
.bi-send {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: var(--radius-s);
  border: none; background: var(--amber); color: var(--void);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.bi-send svg { width: 12px; height: 12px; }

/* ============ FILES DRAWER ============ */
.files-drawer {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 280px; background: var(--surface-0);
  border-left: 1px solid var(--border-0);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 15; overflow-y: auto;
  padding: 16px;
}
.files-drawer.open { transform: translateX(0); }
.fd-header {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-3); font-weight: 500; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.fd-close {
  width: 20px; height: 20px; border-radius: 4px;
  border: none; background: var(--surface-2);
  color: var(--text-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.fd-file {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: var(--radius-s);
  background: var(--surface-1); border: 1px solid var(--border-0);
  margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
}
.fd-file:hover { background: var(--surface-2); }
.fd-file .fd-icon { color: var(--amber); font-size: 14px; }
.fd-file .fd-name {
  font-family: var(--font-m); font-size: 12px; color: var(--text-0); flex: 1;
}
.fd-file .fd-size { font-size: 10px; color: var(--text-3); }

.fd-stats { margin-top: 16px; }
.fd-stat {
  display: flex; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid var(--border-0);
  font-size: 12px;
}
.fd-stat .fd-k { color: var(--text-3); }
.fd-stat .fd-v { color: var(--text-1); font-family: var(--font-m); }

/* ============ TOP CONTROLS ============ */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 9999; display: flex; align-items: center;
  justify-content: center; padding: 10px 16px; gap: 10px;
  background: linear-gradient(var(--void) 50%, transparent);
  pointer-events: none;
}
.top-bar > * { pointer-events: auto; }
.ctrl-group {
  display: flex; background: var(--surface-2);
  border: 1px solid var(--border-1); border-radius: 8px;
  padding: 2px; gap: 1px;
}
.ctrl-btn {
  padding: 5px 12px; font-size: 11px; font-weight: 500;
  color: var(--text-3); border: none; background: none;
  border-radius: 6px; cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.ctrl-btn:hover { color: var(--text-1); }
.ctrl-btn.active { background: var(--surface-3); color: var(--text-0); }
.ctrl-btn.amber { background: var(--amber); color: var(--void); }

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-1); border-radius: 2px; }
</style>
</head>
<body data-lang="zh">

<!-- Top Controls -->
<div class="top-bar">
  <div class="ctrl-group">
    <button class="ctrl-btn amber" onclick="resetToEmpty()">&#8634; Reset</button>
    <button class="ctrl-btn" onclick="jumpTo('decision')">Decision</button>
    <button class="ctrl-btn" onclick="jumpTo('building')">Building</button>
    <button class="ctrl-btn" onclick="jumpTo('complete')">Complete</button>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn active" id="btn-zh" onclick="setLang('zh')">ZH</button>
    <button class="ctrl-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <span class="mark"><span class="e">E</span>duce</span>
      <span class="tag" data-en="draw out" data-zh="引而出之">引而出之</span>
    </div>
    <button class="sb-new" onclick="resetToEmpty()">
      <span class="plus">+</span>
      <span data-en="New brief" data-zh="新任务">新任务</span>
    </button>
    <div class="sb-section" data-en="Recent" data-zh="最近">最近</div>
    <div class="sb-list" id="sb-list">
      <div class="sb-item" data-en="Calculator app" data-zh="计算器">
        计算器<span class="time" data-en="15 min ago" data-zh="15分钟前">15分钟前</span>
      </div>
      <div class="sb-item" data-en="Markdown editor" data-zh="Markdown 编辑器">
        Markdown 编辑器<span class="time" data-en="1 hour ago" data-zh="1小时前">1小时前</span>
      </div>
    </div>
    <div class="sb-bottom">
      <div class="sb-model"><span class="dot"></span>DeepSeek V4 Flash</div>
    </div>
  </aside>

  <!-- Canvas -->
  <div class="canvas">
    <!-- Phase: Empty -->
    <div class="phase-empty" id="phase-empty">
      <div class="sigil">
        <svg viewBox="0 0 72 72">
          <circle class="r1" cx="36" cy="36" r="34" />
          <circle class="r2" cx="36" cy="36" r="22" />
          <circle class="a1" cx="36" cy="36" r="34" />
          <circle class="a2" cx="36" cy="36" r="22" />
          <circle class="core" cx="36" cy="36" r="3" />
        </svg>
      </div>
      <h1 class="empty-title" data-en="What will you make?" data-zh="想做点什么？">想做点什么？</h1>
      <p class="empty-sub" data-en="A game, a tool, an idea — anything." data-zh="一个游戏、一个工具、一个想法——都行。">一个游戏、一个工具、一个想法——都行。</p>

      <div class="input-wrap">
        <textarea class="input-main" id="main-input" rows="1"
          data-en-placeholder="Make me a Contra-style shooting game..."
          data-zh-placeholder="做一个魂斗罗风格的射击游戏..."
          placeholder="做一个魂斗罗风格的射击游戏..."></textarea>
        <button class="send-btn" onclick="startBuild()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <div class="starters">
        <button class="starter" onclick="quickStart(this)" data-en="Pomodoro timer" data-zh="番茄钟">番茄钟</button>
        <button class="starter" onclick="quickStart(this)" data-en="JSON formatter" data-zh="JSON 工具">JSON 工具</button>
        <button class="starter" onclick="quickStart(this)" data-en="Retro game" data-zh="复古游戏">复古游戏</button>
        <button class="starter" onclick="quickStart(this)" data-en="Data dashboard" data-zh="数据看板">数据看板</button>
      </div>
    </div>

    <!-- Phase: Build -->
    <div class="phase-build" id="phase-build">
      <div class="brief-bar">
        <span class="brief-tag" data-en="BRIEF" data-zh="任务">任务</span>
        <span class="brief-text" id="brief-text"></span>
        <span class="brief-timer" id="brief-timer">0s</span>
      </div>

      <div class="canvas-body">
        <div class="preview-area" id="preview-area">
          <!-- Skeleton -->
          <div class="preview-skeleton" id="preview-skeleton">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 16px; width: 320px;">
              <div class="skeleton-shape" style="width: 200px; height: 20px;"></div>
              <div class="skeleton-shape" style="width: 300px; height: 200px; animation-delay: 0.3s;"></div>
              <div class="skeleton-shape" style="width: 160px; height: 14px; animation-delay: 0.6s;"></div>
              <div style="display: flex; gap: 8px;">
                <div class="skeleton-shape" style="width: 60px; height: 10px; animation-delay: 0.9s;"></div>
                <div class="skeleton-shape" style="width: 60px; height: 10px; animation-delay: 1.1s;"></div>
              </div>
            </div>
          </div>

          <!-- Live preview (game mockup) -->
          <div class="preview-live" id="preview-live">
            <div class="game-preview">
              <div class="game-title">CONTRA</div>
              <div class="game-controls" data-en="Arrow keys to move · Space to shoot" data-zh="方向键移动 · 空格射击">方向键移动 · 空格射击</div>
              <div class="game-screen" id="game-screen">
                <div class="game-star" style="top: 12%; left: 20%;"></div>
                <div class="game-star" style="top: 8%; left: 55%;"></div>
                <div class="game-star" style="top: 25%; left: 80%;"></div>
                <div class="game-star" style="top: 15%; left: 35%;"></div>
                <div class="game-star" style="top: 30%; left: 65%;"></div>
                <div class="game-ground"></div>
                <div class="game-player" id="game-player"></div>
                <div class="game-enemy"></div>
                <div class="game-bullet" id="game-bullet"></div>
                <div class="game-hud-left">SCORE: 1200</div>
                <div class="game-hud-right">HP: &#9829;&#9829;&#9829;</div>
              </div>
            </div>
          </div>

          <!-- Process strip -->
          <div class="process-strip" id="process-strip">
            <div class="progress-steps" id="progress-steps">
              <!-- Filled by JS -->
            </div>
            <div class="activity-toggle" id="activity-toggle" onclick="toggleLog()">
              <span class="arrow">&#9654;</span>
              <span data-en="Activity" data-zh="详细过程">详细过程</span>
            </div>
            <div class="activity-log" id="activity-log">
              <!-- Filled by JS -->
            </div>
          </div>

          <!-- Decision overlay -->
          <div class="decision-overlay" id="decision-overlay">
            <div class="dc-card">
              <h3 data-en="A few decisions" data-zh="先确认一下">先确认一下</h3>
              <div class="dc-sub" data-en="Quick choices for a better result." data-zh="几个选择，结果会更好。">几个选择，结果会更好。</div>
              <div class="dc-group">
                <div class="dc-label" data-en="TECH STACK" data-zh="技术栈">技术栈</div>
                <div class="dc-opts">
                  <button class="dc-opt sel" onclick="selectOpt(this)">HTML5 Canvas + JS</button>
                  <button class="dc-opt" onclick="selectOpt(this)">Python + Pygame</button>
                </div>
              </div>
              <div class="dc-group">
                <div class="dc-label" data-en="SCOPE" data-zh="范围">范围</div>
                <div class="dc-opts">
                  <button class="dc-opt sel" onclick="selectOpt(this)" data-en="Core: shoot, jump, 1 boss" data-zh="核心玩法：射击、跳跃、1个Boss">核心玩法：射击、跳跃、1个Boss</button>
                  <button class="dc-opt" onclick="selectOpt(this)" data-en="Full: levels, upgrades" data-zh="完整版：多关卡、升级">完整版：多关卡、升级</button>
                </div>
              </div>
              <div class="dc-btns">
                <button class="dc-primary" onclick="confirmDecision()" data-en="Confirm" data-zh="确认开始">确认开始</button>
                <button class="dc-ghost" onclick="confirmDecision()" data-en="Skip" data-zh="跳过">跳过</button>
              </div>
            </div>
          </div>

          <!-- Files drawer -->
          <div class="files-drawer" id="files-drawer">
            <div class="fd-header">
              <span data-en="Files" data-zh="文件">文件</span>
              <button class="fd-close" onclick="toggleFiles()">&#10005;</button>
            </div>
            <div class="fd-file">
              <span class="fd-icon">&#9634;</span>
              <span class="fd-name">contra.html</span>
              <span class="fd-size">18.5 KB</span>
            </div>
            <div class="fd-stats">
              <div class="fd-stat">
                <span class="fd-k" data-en="Duration" data-zh="耗时">耗时</span>
                <span class="fd-v">23s</span>
              </div>
              <div class="fd-stat">
                <span class="fd-k" data-en="Rounds" data-zh="轮次">轮次</span>
                <span class="fd-v">2</span>
              </div>
              <div class="fd-stat">
                <span class="fd-k" data-en="Size" data-zh="大小">大小</span>
                <span class="fd-v">18.5 KB</span>
              </div>
              <div class="fd-stat">
                <span class="fd-k" data-en="Checks" data-zh="检查">检查</span>
                <span class="fd-v" style="color: var(--pass);">&#10003; Passed</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Complete bar -->
      <div class="complete-bar" id="complete-bar">
        <div class="complete-badge">&#10003;</div>
        <div class="complete-info">
          <div class="name">contra.html</div>
          <div class="meta">
            <span>18.5 KB</span>
            <span data-en="2 rounds" data-zh="2轮">2轮</span>
            <span>23s</span>
          </div>
        </div>
        <div class="complete-actions">
          <button class="c-btn" onclick="toggleFiles()" data-en="Files" data-zh="文件">文件</button>
          <button class="c-btn" data-en="Copy" data-zh="复制">复制</button>
          <button class="c-btn primary" data-en="Open" data-zh="新窗口打开">新窗口打开</button>
        </div>
      </div>

      <!-- Bottom input -->
      <div class="bottom-input" id="bottom-input">
        <div class="bi-wrap">
          <input class="bi-field" type="text"
            data-en-placeholder="Add a feature, fix something, ask a question..."
            data-zh-placeholder="加功能、改bug、问问题..."
            placeholder="加功能、改bug、问问题..." />
          <button class="bi-send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const L = {
  steps: {
    zh: ['分析需求', '搭建结构', '填充细节', '测试修复', '完成'],
    en: ['Analyzing', 'Structuring', 'Detailing', 'Testing', 'Done']
  },
  logs: {
    zh: [
      { icon: '&#9679;', text: '理解需求：魂斗罗风格横版射击', color: 'var(--text-3)' },
      { icon: '&#9679;', text: '选择方案：Canvas 2D + 精灵动画', color: 'var(--text-3)' },
      { icon: '&#9679;', text: '写入 <code>contra.html</code>，搭建游戏框架', color: 'var(--amber)' },
      { icon: '&#9679;', text: '添加角色、移动、射击、敌人', color: 'var(--amber)' },
      { icon: '&#9679;', text: '语法检查', result: 'ok', resultText: '通过' },
      { icon: '&#9679;', text: '运行测试', result: 'err', resultText: 'DOM不可用' },
      { icon: '&#9679;', text: '诊断：浏览器文件，跳过 Node 测试', color: 'var(--text-3)' },
      { icon: '&#9679;', text: '修复事件监听器', color: 'var(--amber)' },
      { icon: '&#9679;', text: '全部检查', result: 'ok', resultText: '通过' },
    ],
    en: [
      { icon: '&#9679;', text: 'Understanding: Contra-style side-scrolling shooter', color: 'var(--text-3)' },
      { icon: '&#9679;', text: 'Approach: Canvas 2D + sprite animation', color: 'var(--text-3)' },
      { icon: '&#9679;', text: 'Writing <code>contra.html</code> — game framework', color: 'var(--amber)' },
      { icon: '&#9679;', text: 'Adding player, movement, shooting, enemies', color: 'var(--amber)' },
      { icon: '&#9679;', text: 'Syntax check', result: 'ok', resultText: 'passed' },
      { icon: '&#9679;', text: 'Runtime test', result: 'err', resultText: 'no DOM' },
      { icon: '&#9679;', text: 'Diagnosed: browser-only file, skip Node test', color: 'var(--text-3)' },
      { icon: '&#9679;', text: 'Fixed event listeners', color: 'var(--amber)' },
      { icon: '&#9679;', text: 'All checks', result: 'ok', resultText: 'passed' },
    ]
  }
};

let lang = 'zh';
let buildTimer = null;
let buildSec = 0;
let currentPhase = 'empty';

function setLang(l) {
  lang = l;
  document.body.setAttribute('data-lang', l);
  document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.querySelectorAll('[data-' + l + ']').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + l);
  });
  document.querySelectorAll('[data-' + l + '-placeholder]').forEach(el => {
    el.placeholder = el.getAttribute('data-' + l + '-placeholder');
  });
  if (currentPhase !== 'empty') renderSteps();
}

function resetToEmpty() {
  currentPhase = 'empty';
  clearInterval(buildTimer);
  document.getElementById('phase-empty').classList.remove('leaving');
  document.getElementById('phase-empty').style.display = '';
  const pb = document.getElementById('phase-build');
  pb.classList.remove('active');
  pb.style.display = 'none';
  document.getElementById('decision-overlay').classList.remove('active');
  document.getElementById('complete-bar').classList.remove('active');
  document.getElementById('bottom-input').classList.remove('active');
  document.getElementById('preview-skeleton').classList.remove('hidden');
  document.getElementById('preview-live').classList.remove('visible');
  document.getElementById('files-drawer').classList.remove('open');
  document.getElementById('activity-log').classList.remove('open');
  document.getElementById('activity-toggle').classList.remove('open');
  // remove active session
  const existing = document.querySelector('.sb-item.active');
  if (existing) existing.classList.remove('active');
}

function quickStart(btn) {
  document.getElementById('main-input').value = btn.textContent;
  startBuild();
}

function startBuild() {
  const input = document.getElementById('main-input');
  const text = input.value.trim();
  if (!text) return;

  // Add to sidebar
  const list = document.getElementById('sb-list');
  const existing = document.querySelector('.sb-item.active');
  if (existing) existing.classList.remove('active');
  const item = document.createElement('div');
  item.className = 'sb-item active';
  item.innerHTML = text + '<span class="time" data-en="now" data-zh="进行中">' + (lang === 'zh' ? '进行中' : 'now') + '</span>';
  list.insertBefore(item, list.firstChild);

  // Transition
  document.getElementById('phase-empty').classList.add('leaving');
  setTimeout(() => {
    document.getElementById('phase-empty').style.display = 'none';
    const pb = document.getElementById('phase-build');
    pb.style.display = '';
    pb.classList.add('active');
    document.getElementById('brief-text').textContent = text;

    currentPhase = 'decision';
    buildSec = 0;
    buildTimer = setInterval(() => {
      buildSec++;
      document.getElementById('brief-timer').textContent = buildSec + 's';
    }, 1000);

    // Show decision after 1.5s
    setTimeout(() => {
      document.getElementById('decision-overlay').classList.add('active');
    }, 800);

    renderSteps();
  }, 400);
}

function selectOpt(btn) {
  const group = btn.parentElement;
  group.querySelectorAll('.dc-opt').forEach(o => o.classList.remove('sel'));
  btn.classList.add('sel');
}

function confirmDecision() {
  document.getElementById('decision-overlay').classList.remove('active');
  currentPhase = 'building';
  startBuildSequence();
}

function startBuildSequence() {
  const logs = L.logs[lang];
  const logEl = document.getElementById('activity-log');
  logEl.innerHTML = '';

  let step = 0;
  const steps = [0, 0, 2, 4, 5, 7, 8]; // which log triggers which progress step
  let currentStep = 0;

  function addLog(i) {
    if (i >= logs.length) {
      finishBuild();
      return;
    }
    const l = logs[i];
    const div = document.createElement('div');
    div.className = 'log-item';
    let html = '<span class="log-icon" style="color: ' + (l.color || 'var(--text-3)') + ';">' + l.icon + '</span>';
    html += '<span class="log-text">' + l.text + '</span>';
    if (l.result) {
      html += '<span class="log-result ' + l.result + '">' + l.resultText + '</span>';
    }
    div.innerHTML = html;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;

    // Update progress step
    if (i <= 1) updateStep(0);
    else if (i <= 3) updateStep(1);
    else if (i === 4) updateStep(2);
    else if (i <= 7) updateStep(3);
    else updateStep(4);

    // Show preview at step 3 (detailing)
    if (i === 3) {
      document.getElementById('preview-skeleton').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('preview-live').classList.add('visible');
      }, 300);
    }

    setTimeout(() => addLog(i + 1), 600 + Math.random() * 800);
  }

  setTimeout(() => addLog(0), 500);
}

function updateStep(idx) {
  const steps = document.querySelectorAll('.p-step');
  steps.forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i < idx) s.classList.add('done');
    else if (i === idx) s.classList.add('active');
  });
}

function finishBuild() {
  currentPhase = 'complete';
  clearInterval(buildTimer);
  updateStep(4);

  // Update sidebar
  const active = document.querySelector('.sb-item.active .time');
  if (active) active.textContent = lang === 'zh' ? '刚刚' : 'just now';

  // Show complete bar & bottom input
  setTimeout(() => {
    document.getElementById('complete-bar').classList.add('active');
    document.getElementById('bottom-input').classList.add('active');
  }, 500);
}

function renderSteps() {
  const names = L.steps[lang];
  const el = document.getElementById('progress-steps');
  el.innerHTML = '';
  names.forEach((name, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'p-arrow';
      arrow.textContent = '›';
      el.appendChild(arrow);
    }
    const step = document.createElement('span');
    step.className = 'p-step';
    step.innerHTML = '<span class="p-dot"></span>' + name;
    el.appendChild(step);
  });
}

function toggleLog() {
  const log = document.getElementById('activity-log');
  const toggle = document.getElementById('activity-toggle');
  log.classList.toggle('open');
  toggle.classList.toggle('open');
}

function toggleFiles() {
  document.getElementById('files-drawer').classList.toggle('open');
}

function jumpTo(phase) {
  resetToEmpty();
  document.getElementById('main-input').value = lang === 'zh' ? '做一个魂斗罗风格的射击游戏' : 'Make a Contra-style shooting game';

  setTimeout(() => {
    startBuild();
    if (phase === 'building' || phase === 'complete') {
      setTimeout(() => {
        confirmDecision();
        if (phase === 'complete') {
          setTimeout(() => {
            document.getElementById('preview-skeleton').classList.add('hidden');
            document.getElementById('preview-live').classList.add('visible');
            updateStep(4);
            clearInterval(buildTimer);
            document.getElementById('brief-timer').textContent = '23s';
            const active = document.querySelector('.sb-item.active .time');
            if (active) active.textContent = lang === 'zh' ? '刚刚' : 'just now';
            document.getElementById('complete-bar').classList.add('active');
            document.getElementById('bottom-input').classList.add('active');
            // Add logs
            const logs = L.logs[lang];
            const logEl = document.getElementById('activity-log');
            logEl.innerHTML = '';
            logs.forEach(l => {
              const div = document.createElement('div');
              div.className = 'log-item';
              let html = '<span class="log-icon" style="color: ' + (l.color || 'var(--text-3)') + ';">' + l.icon + '</span>';
              html += '<span class="log-text">' + l.text + '</span>';
              if (l.result) html += '<span class="log-result ' + l.result + '">' + l.resultText + '</span>';
              div.innerHTML = html;
              logEl.appendChild(div);
            });
            currentPhase = 'complete';
          }, 200);
        }
      }, 600);
    }
  }, 50);
}

// Init
renderSteps();
</script>
</body>
</html>
