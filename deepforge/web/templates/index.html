<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeepForge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;--white:#FFFFFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;
  --brand:#6366F1;--brand-l:#EEF2FF;--brand-h:#4F46E5;--green:#10B981;--amber:#F59E0B;--red:#EF4444;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--sh-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --r:10px;--r-lg:14px;--r-full:9999px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--g800);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.5}

nav{height:52px;padding:0 24px;display:flex;align-items:center;background:var(--white);border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:50}
nav .logo{font-size:15px;font-weight:700;color:var(--g900);letter-spacing:-.02em}
nav .logo span{background:linear-gradient(135deg,var(--brand),#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav .sp{flex:1}
nav .pill{font-size:11px;color:var(--g500);background:var(--g100);border:1px solid var(--g200);padding:4px 10px;border-radius:var(--r-full);display:flex;align-items:center;gap:5px}
nav .pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
nav .pill.off::before{background:var(--red)}

.chat{flex:1;overflow-y:auto;padding:32px 16px 130px}
.chat-inner{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:24px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:16px}
.empty-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:24px;color:white;box-shadow:0 4px 14px rgba(99,102,241,.25)}
.empty h2{font-size:24px;font-weight:600;color:var(--g900);letter-spacing:-.02em}
.empty p{font-size:14px;color:var(--g500);max-width:360px}
.tpls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.tpl{padding:7px 14px;font-size:12px;color:var(--g600);background:var(--white);border:1px solid var(--g200);border-radius:var(--r-full);cursor:pointer;transition:all .15s}
.tpl:hover{border-color:var(--brand);color:var(--brand);box-shadow:0 1px 2px rgba(0,0,0,.05)}

.msg-u{display:flex;justify-content:flex-end}
.msg-u .bub{background:var(--brand);color:white;border-radius:18px 18px 4px 18px;padding:10px 16px;max-width:75%;font-size:14px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.msg-a{font-size:14px;color:var(--g700);line-height:1.7;white-space:pre-line}

.wc{background:var(--white);border:1px solid var(--g200);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.wc-h{padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.wc-h:hover{background:var(--g50)}
.wc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wc-dot.on{background:var(--brand);animation:pulse 1.5s infinite}
.wc-dot.ok{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.wc-t{font-size:13px;font-weight:500;color:var(--g700);flex:1}
.wc-m{font-size:11px;color:var(--g400)}

.wc-steps{border-top:1px solid var(--g100);padding:8px 16px}
.st{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.st-ck{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--g300);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:transparent;transition:all .2s}
.st.done .st-ck{border-color:var(--green);background:var(--green);color:white}
.st.on .st-ck{border-color:var(--brand);background:var(--brand-l)}
.st-lb{color:var(--g600)}.st.on .st-lb{color:var(--brand);font-weight:500}.st.wait .st-lb{color:var(--g400)}
.st-sm{color:var(--g400);margin-left:auto;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.streaming{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--g400)}
.sdots span{width:4px;height:4px;border-radius:50%;background:var(--g400);display:inline-block;animation:bounce .6s infinite}
.sdots span:nth-child(2){animation-delay:.1s}
.sdots span:nth-child(3){animation-delay:.2s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.wc-prev{border-top:1px solid var(--g100);padding:12px 16px}
.prev-btn{font-size:12px;color:var(--brand);cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.prev-btn:hover{text-decoration:underline}
.prev-fr{width:100%;height:400px;border:1px solid var(--g200);border-radius:var(--r);margin-top:8px;background:white}

.in-area{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 20%);padding:12px 16px 20px;z-index:40}
.in-box{max-width:680px;margin:0 auto;position:relative}
.in-box textarea{width:100%;background:var(--white);border:1px solid var(--g200);border-radius:var(--r-lg);padding:12px 48px 12px 16px;font-size:14px;color:var(--g800);font-family:inherit;resize:none;outline:none;min-height:48px;max-height:120px;line-height:1.5;box-shadow:var(--sh-md);transition:border-color .15s,box-shadow .15s}
.in-box textarea:focus{border-color:var(--brand);box-shadow:var(--sh-md),0 0 0 3px rgba(99,102,241,.1)}
.in-box textarea::placeholder{color:var(--g400)}
.in-box .go{position:absolute;right:8px;bottom:8px;width:32px;height:32px;border-radius:8px;background:var(--brand);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
.in-box .go:hover{background:var(--brand-h);transform:scale(1.05)}
.in-box .go:disabled{background:var(--g200);cursor:default;transform:none}
.in-box .go svg{width:16px;height:16px}

@media(max-width:640px){.chat{padding:20px 12px 100px}.tpls{gap:6px}.tpl{font-size:11px;padding:5px 10px}.msg-u .bub{max-width:85%}}
</style>
</head>
<body>
<nav>
  <div class="logo">Deep<span>Forge</span></div>
  <div class="sp"></div>
  <div class="pill" id="pill"><span id="mdl">connecting...</span></div>
</nav>

<div class="chat" id="chat">
  <div class="chat-inner" id="ci">
    <div class="empty" id="emp">
      <div class="empty-icon">⚡</div>
      <h2>What will you build?</h2>
      <p>描述你想创建的东西，7个AI Agent协作帮你完成</p>
      <div class="tpls">
        <div class="tpl" onclick="qs('帮我做一个番茄钟')">🍅 番茄钟</div>
        <div class="tpl" onclick="qs('做一个JSON格式化工具')">🔧 JSON工具</div>
        <div class="tpl" onclick="qs('做一个贪吃蛇游戏')">🎮 小游戏</div>
        <div class="tpl" onclick="qs('做一个Markdown编辑器')">📝 编辑器</div>
        <div class="tpl" onclick="qs('做一个计算器')">🧮 计算器</div>
      </div>
    </div>
  </div>
</div>

<div class="in-area">
  <div class="in-box">
    <textarea id="inp" placeholder="描述你想创建的东西..." rows="1"></textarea>
    <button class="go" id="btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
</div>

<script>
const sid=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36);
let ws,wk=false,wc=null;
const AN={project_manager:'规划',product_manager:'设计',architect:'架构',engineer:'编码',reviewer:'审查',crowd_user:'测试',memory_keeper:'沉淀'};
const AO=['project_manager','product_manager','architect','engineer','reviewer','crowd_user','memory_keeper'];

function conn(){
  const p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${p}//localhost:7860/ws/${sid}`);
  ws.onopen=()=>{$('pill').classList.remove('off');fetch('http://localhost:7860/api/status').then(r=>r.json()).then(d=>$('mdl').textContent=d.model||'ready')};
  ws.onclose=()=>{$('pill').classList.add('off');$('mdl').textContent='offline';setTimeout(conn,3000)};
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='status'){
      if(d.content==='processing')startWk();
      else if(d.content==='done')endWk();
    }else if(d.type==='agent_message'){
      if(d.msg_type!=='handoff'){
        if(wk)updStep(d.sender,d.summary||'',d.has_files,d.content);
        else addA(d.content);
      }
    }else if(d.type==='chunk'){updStream(d.sender)}
    else if(d.type==='error'){endWk();addA('⚠️ '+d.content)}
  };
}
function addU(t){hideE();const d=document.createElement('div');d.className='msg-u';d.innerHTML=`<div class="bub">${esc(t)}</div>`;$('ci').appendChild(d);sb()}
function addA(t){const d=document.createElement('div');d.className='msg-a';d.textContent=t;$('ci').appendChild(d);sb()}
function startWk(){
  wk=true;hideE();
  wc=document.createElement('div');wc.className='wc';
  wc.innerHTML=`<div class="wc-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'"><div class="wc-dot on"></div><div class="wc-t">Agent 正在工作</div><div class="wc-m" id="wt">0s</div></div><div class="wc-steps" id="ws">${AO.map(a=>`<div class="st wait" data-a="${a}"><div class="st-ck">✓</div><span class="st-lb">${AN[a]}</span><span class="st-sm"></span></div>`).join('')}<div class="streaming" id="stm" style="display:none"><div class="sdots"><span></span><span></span><span></span></div><span id="stmA"></span></div></div>`;
  $('ci').appendChild(wc);sb();
  wc._t=Date.now();wc._i=setInterval(()=>{$('wt').textContent=Math.floor((Date.now()-wc._t)/1000)+'s'},1000);
  const f=wc.querySelector('[data-a="project_manager"]');if(f)f.className='st on';
}
function updStep(a,sm,hf,ct){
  if(!wc)return;
  const el=wc.querySelector(`[data-a="${a}"]`);if(el){el.className='st done';el.querySelector('.st-sm').textContent=sm}
  const i=AO.indexOf(a);if(i>=0&&i<AO.length-1){const n=wc.querySelector(`[data-a="${AO[i+1]}"]`);if(n)n.className='st on'}
  if(hf){const h=exH(ct);if(h){let p=wc.querySelector('.wc-prev');if(!p){p=document.createElement('div');p.className='wc-prev';wc.appendChild(p)}const u=URL.createObjectURL(new Blob([h],{type:'text/html'}));p.innerHTML=`<span class="prev-btn" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ 查看产出物</span><iframe class="prev-fr" src="${u}" style="display:none"></iframe><a href="${u}" target="_blank" style="font-size:11px;color:var(--g400);margin-left:12px">新窗口 ↗</a>`}}
  $('stm').style.display='none';sb();
}
function updStream(a){const el=$('stm');if(el){el.style.display='flex';$('stmA').textContent=AN[a]||a}}
function endWk(){wk=false;if(wc){clearInterval(wc._i);const d=wc.querySelector('.wc-dot');if(d)d.className='wc-dot ok';wc.querySelector('.wc-t').textContent='完成'}sb()}
function exH(c){const m=c.match(/```filepath:[^\n]+\.html\n([\s\S]*?)```/)||c.match(/(<!DOCTYPE[\s\S]*?<\/html>)/i);return m?m[1]:null}
function send(){const el=$('inp'),t=el.value.trim();if(!t||!ws||ws.readyState!==1)return;addU(t);ws.send(JSON.stringify({message:t}));el.value='';el.style.height='auto'}
function qs(t){$('inp').value=t;send()}
function hideE(){const e=$('emp');if(e)e.style.display='none'}
function sb(){$('chat').scrollTop=$('chat').scrollHeight}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function $(id){return document.getElementById(id)}
$('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
$('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
conn();
</script>
</body>
</html>
