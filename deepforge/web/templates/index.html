<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#09090b;--surface:#18181b;--surface-el:#27272a;--surface-hi:#3f3f46;
    --border:rgba(255,255,255,.06);--border-hi:rgba(255,255,255,.12);
    --text:#fafafa;--text-2:#a1a1aa;--text-3:#71717a;--text-4:#52525b;
    --accent:#06b6d4;--accent-dim:rgba(6,182,212,.12);--accent-glow:rgba(6,182,212,.2);
    --green:#10b981;--green-dim:rgba(16,185,129,.12);
    --amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
    --red:#ef4444;
    --radius:14px;--radius-sm:8px;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Mesh gradient background ── */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(6,182,212,.08) 0%,transparent 70%);animation:float 20s ease-in-out infinite}
.bg-mesh::after{content:'';position:absolute;width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(139,92,246,.06) 0%,transparent 70%);animation:float 25s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}

/* ── Header ── */
header{position:relative;z-index:10;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,9,11,.6);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.logo span{color:var(--accent)}
.hdr-r{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text-3)}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.hdr-dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}

/* ── Content wrapper ── */
.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ══ HOME STATE ══ */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:40px 24px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center}
.brand-icon{width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 40px var(--accent-glow);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 8px 40px var(--accent-glow)}50%{box-shadow:0 12px 60px rgba(6,182,212,.3)}}
.brand h1{font-size:32px;font-weight:700;letter-spacing:-.03em}
.brand p{margin-top:8px;font-size:15px;color:var(--text-2);max-width:360px}

/* Input box */
.input-box{width:100%;max-width:620px;position:relative}
.input-box textarea{width:100%;background:var(--surface);border:1px solid var(--border-hi);border-radius:var(--radius);padding:14px 52px 14px 18px;font-size:15px;color:var(--text);font-family:inherit;resize:none;outline:none;min-height:52px;max-height:120px;transition:border-color .2s,box-shadow .2s;line-height:1.5}
.input-box textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim)}
.input-box textarea::placeholder{color:var(--text-4)}
.input-box .send{position:absolute;right:8px;bottom:8px;width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.input-box .send:hover{transform:scale(1.08)}
.input-box .send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.input-box .send svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Templates */
.templates{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:620px}
.tpl{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:13px;color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tpl:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tpl span{font-size:15px}

/* ══ WORKING STATE ══ */
.workspace{flex:1;display:none;flex-direction:column;padding:24px 28px;gap:16px;overflow:hidden;animation:fadeUp .4s ease}
.workspace.show{display:flex}

/* Timeline steps */
.timeline{display:flex;flex-direction:column;gap:0;max-width:620px;width:100%;margin:0 auto}
.step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;position:relative}
.step::before{content:'';position:absolute;left:11px;top:32px;bottom:0;width:1px;background:var(--border)}
.step:last-child::before{display:none}
.step-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--surface-hi);background:var(--surface);transition:all .3s}
.step.done .step-dot{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.step.active .step-dot{background:var(--amber-dim);border-color:var(--amber);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--amber-dim)}50%{box-shadow:0 0 0 6px transparent}}
.step.pending .step-dot{opacity:.3}
.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:500;color:var(--text)}
.step.pending .step-name{color:var(--text-4)}
.step-summary{font-size:12px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step.active .step-summary{color:var(--amber)}
.step-time{font-size:10px;color:var(--text-4);margin-left:auto;flex-shrink:0;padding-top:2px}

/* Preview */
.preview{display:none;flex:1;min-height:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:slideUp .4s ease}
.preview.show{display:flex;flex-direction:column}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.preview-bar{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3)}
.preview-bar .url{flex:1;background:var(--surface-el);border-radius:6px;padding:4px 10px;font-family:monospace;font-size:10px;color:var(--text-4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-bar a{color:var(--accent);text-decoration:none;font-size:12px}
.preview iframe{flex:1;border:none;background:#fff;width:100%}

/* Bottom bar in workspace */
.ws-input{max-width:620px;width:100%;margin:0 auto}
.ws-input textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;min-height:40px;max-height:80px;transition:border-color .2s}
.ws-input textarea:focus{border-color:var(--accent)}
.ws-input textarea::placeholder{color:var(--text-4)}

/* Timer badge */
.timer{position:fixed;top:14px;right:140px;font-size:11px;color:var(--text-3);font-family:monospace;z-index:20;display:none}
.timer.show{display:block}

/* Detail drawer */
.drawer-toggle{text-align:center;font-size:11px;color:var(--text-4);cursor:pointer;padding:4px}
.drawer-toggle:hover{color:var(--accent)}
.drawer{display:none;max-height:200px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:'JetBrains Mono','SF Mono',monospace;font-size:11px;line-height:1.6;color:var(--text-3)}
.drawer.show{display:block}

@media(max-width:640px){
    .home{padding:24px 16px;gap:24px}
    .brand h1{font-size:24px}
    .templates{gap:6px}
    .tpl{padding:6px 12px;font-size:12px}
    .workspace{padding:16px}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<header>
    <div class="logo">Deep<span>Forge</span></div>
    <div class="hdr-r">
        <span class="hdr-dot" id="dot"></span>
        <span id="st">connecting</span>
        <span id="mdl" style="font-family:monospace;color:var(--accent)"></span>
    </div>
</header>

<div class="content">
    <!-- Home -->
    <div class="home" id="home">
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <h1>What will you build?</h1>
            <p>Describe what you want, 7 AI agents collaborate to build it for you</p>
        </div>
        <div class="input-box">
            <textarea id="input" placeholder="描述你想创建的东西..." rows="1"></textarea>
            <button class="send" id="btn" onclick="send()"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
        </div>
        <div class="templates">
            <div class="tpl" onclick="go('帮我做一个番茄钟网页，简洁美观，25分钟倒计时')"><span>🍅</span>番茄钟</div>
            <div class="tpl" onclick="go('做一个贪吃蛇Chrome扩展小游戏')"><span>🎮</span>Chrome游戏</div>
            <div class="tpl" onclick="go('帮我做一个Markdown实时预览编辑器')"><span>📝</span>Markdown编辑器</div>
            <div class="tpl" onclick="go('做一个简洁的个人博客首页')"><span>🌐</span>个人网站</div>
            <div class="tpl" onclick="go('帮我做一个记账工具，支持分类统计图表')"><span>💰</span>记账工具</div>
        </div>
    </div>

    <!-- Workspace -->
    <div class="workspace" id="workspace">
        <div class="timeline" id="timeline">
            <div class="step pending" data-agent="project_manager"><div class="step-dot">1</div><div class="step-info"><div class="step-name">项目经理</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="product_manager"><div class="step-dot">2</div><div class="step-info"><div class="step-name">产品经理</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="architect"><div class="step-dot">3</div><div class="step-info"><div class="step-name">架构师</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="engineer"><div class="step-dot">4</div><div class="step-info"><div class="step-name">工程师</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="reviewer"><div class="step-dot">5</div><div class="step-info"><div class="step-name">审查</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="crowd_user"><div class="step-dot">6</div><div class="step-info"><div class="step-name">内测</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
            <div class="step pending" data-agent="memory_keeper"><div class="step-dot">7</div><div class="step-info"><div class="step-name">沉淀</div><div class="step-summary">等待中</div></div><div class="step-time"></div></div>
        </div>

        <div class="preview" id="preview">
            <div class="preview-bar">
                <span>●</span>
                <span class="url" id="prevUrl">preview</span>
                <a href="#" id="prevLink" target="_blank">↗ 新窗口</a>
            </div>
            <iframe id="prevFrame"></iframe>
        </div>

        <div class="drawer-toggle" id="drawerTog" onclick="toggleDrawer()">● 查看详细日志</div>
        <div class="drawer" id="drawer"></div>

        <div class="ws-input">
            <textarea id="input2" placeholder="继续对话或修改需求..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send2()}"></textarea>
        </div>
    </div>
</div>

<div class="timer" id="timer">0s</div>

<script>
const sid=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36);
let ws,busy=false,t0=0,tmr=null,logs=[];
const ORDER=['project_manager','product_manager','architect','engineer','reviewer','crowd_user','memory_keeper'];

function connect(){
    const p=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(`${p}//${location.host}/ws/${sid}`);
    ws.onopen=()=>{$('dot').classList.remove('off');$('st').textContent='ready';fetch('/api/status').then(r=>r.json()).then(d=>$('mdl').textContent=d.model||'')};
    ws.onclose=()=>{$('dot').classList.add('off');$('st').textContent='offline';setTimeout(connect,3000)};
    ws.onmessage=e=>{
        const d=JSON.parse(e.data);
        if(d.type==='agent_message'){
            if(d.msg_type!=='handoff'&&d.summary){
                stepDone(d.sender,d.summary);
                const i=ORDER.indexOf(d.sender);
                if(i>=0&&i<ORDER.length-1)stepActive(ORDER[i+1]);
            }
            logs.push(`[${d.sender}] ${d.content}`);
            $('drawer').textContent=logs.join('\n\n---\n\n');
            if(d.has_files)setTimeout(()=>showPreview(d.content),300);
        }else if(d.type==='status'){
            if(d.content==='processing')startWork();
            else if(d.content==='done')endWork();
        }else if(d.type==='error'){
            endWork();stepErr(d.content);
        }
    };
}

function startWork(){
    busy=true;$('btn').disabled=true;
    $('home').style.display='none';$('workspace').classList.add('show');
    $('timer').classList.add('show');
    resetSteps();stepActive(ORDER[0]);
    logs=[];$('drawer').textContent='';
    $('preview').classList.remove('show');
    t0=Date.now();tick();
}
function endWork(){
    busy=false;$('btn').disabled=false;
    if(tmr)clearInterval(tmr);$('timer').classList.remove('show');
    ORDER.forEach(a=>{const s=document.querySelector(`.step[data-agent="${a}"]`);if(s&&s.classList.contains('pending')){}});
}
function resetSteps(){ORDER.forEach(a=>{const s=document.querySelector(`.step[data-agent="${a}"]`);if(s){s.className='step pending';s.querySelector('.step-summary').textContent='等待中';s.querySelector('.step-time').textContent=''}})}
function stepActive(a){const s=document.querySelector(`.step[data-agent="${a}"]`);if(!s)return;s.className='step active';s.querySelector('.step-summary').textContent='进行中...'}
function stepDone(a,summary){const s=document.querySelector(`.step[data-agent="${a}"]`);if(!s)return;s.className='step done';s.querySelector('.step-dot').innerHTML='✓';s.querySelector('.step-summary').textContent=summary;s.querySelector('.step-time').textContent=elapsed()}
function stepErr(msg){const last=document.querySelector('.step.active');if(last){last.querySelector('.step-summary').textContent='❌ '+msg.slice(0,60)}}

function showPreview(content){
    const m=content.match(/```filepath:([^\n]+\.html)\n([\s\S]*?)```/);
    if(!m)return;
    const blob=new Blob([m[2]],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    $('prevFrame').src=url;$('prevLink').href=url;$('prevUrl').textContent=m[1];
    $('preview').classList.add('show');
}

function toggleDrawer(){$('drawer').classList.toggle('show');$('drawerTog').textContent=$('drawer').classList.contains('show')?'● 收起日志':'● 查看详细日志'}
function tick(){tmr=setInterval(()=>{$('timer').textContent=elapsed()},1000)}
function elapsed(){return Math.floor((Date.now()-t0)/1000)+'s'}
function send(){const el=$('input'),t=el.value.trim();if(!t||busy||!ws||ws.readyState!==1)return;ws.send(JSON.stringify({message:t}));el.value='';el.style.height='auto'}
function send2(){const el=$('input2'),t=el.value.trim();if(!t||busy||!ws||ws.readyState!==1)return;ws.send(JSON.stringify({message:t}));el.value=''}
function go(t){$('input').value=t;send()}
function $(id){return document.getElementById(id)}
$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
$('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
connect();
</script>
</body>
</html>
