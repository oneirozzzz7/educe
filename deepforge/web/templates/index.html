<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepForge - AI创作工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
            --cyan: #39d2c0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, var(--cyan), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span { color: var(--text-dim); font-size: 12px; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
        }

        .status-dot.disconnected { background: var(--red); }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .agent-list { list-style: none; }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 13px;
            transition: background 0.2s;
        }

        .agent-item:hover { background: var(--surface-2); }
        .agent-item.active { background: var(--surface-2); border-left: 2px solid var(--accent); }

        .agent-icon { font-size: 16px; }
        .agent-status { margin-left: auto; font-size: 10px; color: var(--text-dim); }
        .agent-status.working { color: var(--yellow); }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface-2);
        }

        .message-sender.project_manager { color: var(--cyan); }
        .message-sender.product_manager { color: var(--green); }
        .message-sender.architect { color: var(--yellow); }
        .message-sender.engineer { color: var(--accent); }
        .message-sender.reviewer { color: var(--red); }
        .message-sender.crowd_user { color: var(--purple); }
        .message-sender.memory_keeper { color: #e6edf3; }
        .message-sender.user { color: var(--cyan); background: rgba(88, 166, 255, 0.15); }

        .message-time { font-size: 11px; color: var(--text-dim); }

        .message-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.7;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 16px 0 8px 0;
            color: var(--accent);
        }

        .message-content h1:first-child, .message-content h2:first-child, .message-content h3:first-child {
            margin-top: 0;
        }

        .message-content ul, .message-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message-content li { margin: 4px 0; }

        .message-content code {
            background: var(--surface-2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message-content pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-field {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 48px;
            max-height: 120px;
        }

        .input-field:focus { border-color: var(--accent); }

        .input-field::placeholder { color: var(--text-dim); }

        .send-btn {
            background: linear-gradient(135deg, var(--cyan), var(--accent));
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .welcome {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome h2 {
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p { color: var(--text-dim); margin-bottom: 24px; }

        .quick-starts {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 700px;
            margin: 0 auto;
        }

        .quick-start-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-start-btn:hover {
            border-color: var(--accent);
            background: var(--surface-2);
        }

        .typing-indicator {
            display: none;
            padding: 12px 24px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .typing-indicator.show { display: flex; align-items: center; gap: 8px; }

        .typing-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .progress-bar {
            display: none;
            padding: 0 24px 12px;
        }

        .progress-bar.show { display: block; }

        .progress-steps {
            display: flex;
            gap: 4px;
        }

        .progress-step {
            flex: 1;
            height: 3px;
            background: var(--surface-2);
            border-radius: 2px;
            transition: background 0.3s;
        }

        .progress-step.done { background: var(--green); }
        .progress-step.active { background: var(--yellow); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .quick-starts { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>DeepForge</h1>
            <span>AI 创作工坊</span>
        </div>
        <div class="status-bar">
            <span><span class="status-dot" id="statusDot"></span> <span id="statusText">连接中...</span></span>
            <span id="modelName" style="color: var(--text-dim)"></span>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h3>Agent 团队</h3>
            <ul class="agent-list" id="agentList">
                <li class="agent-item" data-agent="project_manager">
                    <span class="agent-icon">🎯</span> 项目经理
                    <span class="agent-status" id="status-project_manager">待命</span>
                </li>
                <li class="agent-item" data-agent="product_manager">
                    <span class="agent-icon">📋</span> 产品经理
                    <span class="agent-status" id="status-product_manager">待命</span>
                </li>
                <li class="agent-item" data-agent="architect">
                    <span class="agent-icon">🏗️</span> 架构师
                    <span class="agent-status" id="status-architect">待命</span>
                </li>
                <li class="agent-item" data-agent="engineer">
                    <span class="agent-icon">💻</span> 工程师
                    <span class="agent-status" id="status-engineer">待命</span>
                </li>
                <li class="agent-item" data-agent="reviewer">
                    <span class="agent-icon">🔍</span> 审查专家
                    <span class="agent-status" id="status-reviewer">待命</span>
                </li>
                <li class="agent-item" data-agent="crowd_user">
                    <span class="agent-icon">👥</span> 内测用户团
                    <span class="agent-status" id="status-crowd_user">待命</span>
                </li>
                <li class="agent-item" data-agent="memory_keeper">
                    <span class="agent-icon">🧠</span> 记忆守护者
                    <span class="agent-status" id="status-memory_keeper">待命</span>
                </li>
            </ul>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <h2>欢迎使用 DeepForge</h2>
                    <p>告诉我你想做什么，7个AI Agent会协作帮你完成</p>
                    <div class="quick-starts">
                        <button class="quick-start-btn" onclick="quickStart('帮我做一个番茄钟网页应用，简洁美观')">🍅 番茄钟应用</button>
                        <button class="quick-start-btn" onclick="quickStart('帮我做一个Markdown编辑器，支持实时预览')">📝 Markdown编辑器</button>
                        <button class="quick-start-btn" onclick="quickStart('做一个Python命令行工具，可以批量重命名文件')">🐍 文件重命名工具</button>
                        <button class="quick-start-btn" onclick="quickStart('帮我做一个记账小工具，支持分类统计')">💰 记账工具</button>
                    </div>
                </div>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-steps" id="progressSteps">
                    <div class="progress-step" data-step="project_manager" title="项目经理"></div>
                    <div class="progress-step" data-step="product_manager" title="产品经理"></div>
                    <div class="progress-step" data-step="architect" title="架构师"></div>
                    <div class="progress-step" data-step="engineer" title="工程师"></div>
                    <div class="progress-step" data-step="reviewer" title="审查"></div>
                    <div class="progress-step" data-step="crowd_user" title="内测"></div>
                    <div class="progress-step" data-step="memory_keeper" title="记忆"></div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <span id="typingText">正在思考...</span>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        class="input-field"
                        id="inputField"
                        placeholder="描述你想创建的东西...（按 Enter 发送，Shift+Enter 换行）"
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
        let ws = null;
        let isProcessing = false;

        const AGENT_NAMES = {
            project_manager: '🎯 项目经理',
            product_manager: '📋 产品经理',
            architect: '🏗️ 架构师',
            engineer: '💻 工程师',
            reviewer: '🔍 审查专家',
            crowd_user: '👥 内测用户团',
            memory_keeper: '🧠 记忆守护者',
            user: '🔥 你',
        };

        const AGENT_ORDER = ['project_manager', 'product_manager', 'architect', 'engineer', 'reviewer', 'crowd_user', 'memory_keeper'];
        let currentAgentIndex = -1;

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/${sessionId}`);

            ws.onopen = () => {
                document.getElementById('statusDot').classList.remove('disconnected');
                document.getElementById('statusText').textContent = '已连接';
                fetch('/api/status').then(r => r.json()).then(data => {
                    document.getElementById('modelName').textContent = data.model || '';
                });
            };

            ws.onclose = () => {
                document.getElementById('statusDot').classList.add('disconnected');
                document.getElementById('statusText').textContent = '已断开';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'agent_message') {
                    hideTyping();
                    addMessage(data.sender, data.content, data.msg_type);
                    updateAgentStatus(data.sender, '完成');
                    advanceProgress(data.sender);

                    const idx = AGENT_ORDER.indexOf(data.sender);
                    if (idx >= 0 && idx < AGENT_ORDER.length - 1) {
                        const next = AGENT_ORDER[idx + 1];
                        updateAgentStatus(next, '工作中');
                        showTyping(AGENT_NAMES[next] + ' 正在工作...');
                    }
                } else if (data.type === 'status') {
                    if (data.content === 'processing') {
                        isProcessing = true;
                        document.getElementById('sendBtn').disabled = true;
                        document.getElementById('progressBar').classList.add('show');
                        currentAgentIndex = 0;
                        updateAgentStatus('project_manager', '工作中');
                        showTyping('🎯 项目经理正在分析需求...');
                    } else if (data.content === 'done') {
                        isProcessing = false;
                        document.getElementById('sendBtn').disabled = false;
                        hideTyping();
                        document.getElementById('progressBar').classList.remove('show');
                        resetAgentStatuses();
                        resetProgress();
                    }
                } else if (data.type === 'error') {
                    isProcessing = false;
                    document.getElementById('sendBtn').disabled = false;
                    hideTyping();
                    addMessage('system', '❌ 错误: ' + data.content, 'error');
                }
            };
        }

        function addMessage(sender, content, msgType) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';

            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';

            const name = AGENT_NAMES[sender] || sender;
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                <div class="message-header">
                    <span class="message-sender ${sender}">${name}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">${renderMarkdown(content)}</div>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function renderMarkdown(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        function sendMessage() {
            const input = document.getElementById('inputField');
            const text = input.value.trim();
            if (!text || isProcessing || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage('user', text, 'user_input');
            ws.send(JSON.stringify({ message: text }));
            input.value = '';
            input.style.height = 'auto';
        }

        function quickStart(text) {
            document.getElementById('inputField').value = text;
            sendMessage();
        }

        function showTyping(text) {
            const el = document.getElementById('typingIndicator');
            document.getElementById('typingText').textContent = text;
            el.classList.add('show');
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('show');
        }

        function updateAgentStatus(agent, status) {
            const el = document.getElementById('status-' + agent);
            if (!el) return;
            el.textContent = status;
            el.className = 'agent-status' + (status === '工作中' ? ' working' : '');

            const item = el.closest('.agent-item');
            document.querySelectorAll('.agent-item').forEach(i => i.classList.remove('active'));
            if (status === '工作中' && item) item.classList.add('active');
        }

        function resetAgentStatuses() {
            AGENT_ORDER.forEach(a => updateAgentStatus(a, '待命'));
            document.querySelectorAll('.agent-item').forEach(i => i.classList.remove('active'));
        }

        function advanceProgress(agent) {
            const step = document.querySelector(`.progress-step[data-step="${agent}"]`);
            if (step) {
                step.classList.remove('active');
                step.classList.add('done');
            }
            const idx = AGENT_ORDER.indexOf(agent);
            if (idx >= 0 && idx < AGENT_ORDER.length - 1) {
                const nextStep = document.querySelector(`.progress-step[data-step="${AGENT_ORDER[idx + 1]}"]`);
                if (nextStep) nextStep.classList.add('active');
            }
        }

        function resetProgress() {
            document.querySelectorAll('.progress-step').forEach(s => {
                s.classList.remove('done', 'active');
            });
        }

        document.getElementById('inputField').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('inputField').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        connectWebSocket();
    </script>
</body>
</html>
