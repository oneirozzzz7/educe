<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepForge</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0e14;--surface:#111820;--surface-2:#1a2332;--border:#1e2d3d;--text:#c5d1de;--text-bright:#e6edf3;--text-dim:#6b7f95;--accent:#58a6ff;--cyan:#39d2c0;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px}
        .logo h1{font-size:18px;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-r{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-dim)}
        .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
        .dot.off{background:var(--red)}

        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:900px;width:100%;margin:0 auto;padding:0 20px}

        /* 欢迎 */
        .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
        .welcome h2{font-size:26px;color:var(--text-bright)}
        .welcome p{color:var(--text-dim);font-size:14px;max-width:400px;line-height:1.6}
        .templates{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:500px}
        .tpl{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
        .tpl:hover{border-color:var(--accent);transform:translateY(-1px)}
        .tpl span{font-size:18px;margin-right:6px}

        /* 工作区 */
        .workspace{flex:1;display:none;flex-direction:column;overflow:hidden;padding:20px 0}
        .workspace.show{display:flex}

        /* 进度终端 */
        .terminal{background:var(--surface);border:1px solid var(--border);border-radius:10px;flex:1;display:flex;flex-direction:column;overflow:hidden}
        .terminal-header{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}
        .terminal-header .dots{display:flex;gap:5px}
        .terminal-header .dots span{width:10px;height:10px;border-radius:50%}
        .terminal-header .dots span:nth-child(1){background:#f85149}
        .terminal-header .dots span:nth-child(2){background:#d29922}
        .terminal-header .dots span:nth-child(3){background:#3fb950}
        .terminal-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:12px;line-height:1.8}
        .terminal-body::-webkit-scrollbar{width:5px}
        .terminal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .log-line{display:flex;gap:8px;margin:2px 0;animation:fadein .2s}
        @keyframes fadein{from{opacity:0}to{opacity:1}}
        .log-time{color:var(--text-dim);flex-shrink:0}
        .log-agent{font-weight:600;flex-shrink:0;min-width:70px}
        .log-agent.pm{color:var(--cyan)}.log-agent.pd{color:var(--green)}.log-agent.arch{color:var(--yellow)}
        .log-agent.eng{color:var(--accent)}.log-agent.rev{color:var(--red)}.log-agent.crowd{color:var(--purple)}.log-agent.mem{color:var(--text-bright)}
        .log-msg{color:var(--text)}
        .log-line.success .log-msg{color:var(--green)}
        .log-line.error .log-msg{color:var(--red)}
        .log-line.info .log-msg{color:var(--text-dim)}

        .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* 预览区 */
        .preview-area{display:none;margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden;height:50vh;position:relative}
        .preview-area.show{display:block}
        .preview-bar{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px}
        .preview-bar a{color:var(--accent);text-decoration:none}
        .preview-bar a:hover{text-decoration:underline}
        .preview-frame{width:100%;height:calc(100% - 30px);border:none;background:#fff}

        /* 详情面板 */
        .detail-toggle{margin-top:8px;font-size:11px;color:var(--text-dim);cursor:pointer;text-align:center}
        .detail-toggle:hover{color:var(--accent)}
        .detail-panel{display:none;margin-top:8px;max-height:300px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.6}
        .detail-panel.show{display:block}
        .detail-panel pre{white-space:pre-wrap;word-break:break-all}

        /* 输入 */
        .input-area{padding:14px 0;display:flex;gap:10px}
        .input-field{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-bright);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:100px}
        .input-field:focus{border-color:var(--accent)}
        .input-field::placeholder{color:var(--text-dim)}
        .send-btn{background:linear-gradient(135deg,var(--cyan),var(--accent));border:none;border-radius:8px;padding:10px 20px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;height:44px}
        .send-btn:disabled{opacity:.4;cursor:not-allowed}

        @media(max-width:768px){.templates{grid-template-columns:1fr}.main{padding:0 12px}}
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>DeepForge</h1></div>
        <div class="header-r"><span class="dot" id="dot"></span><span id="st">connecting</span><span id="mdl" style="color:var(--accent);font-family:monospace"></span></div>
    </header>

    <div class="main">
        <div class="welcome" id="welcome">
            <h2>想做点什么？</h2>
            <p>描述你想创建的东西，7个AI Agent会协作帮你做出来</p>
            <div class="templates">
                <div class="tpl" onclick="go('帮我做一个番茄钟网页，25分钟倒计时，简洁美观')"><span>🍅</span>番茄钟</div>
                <div class="tpl" onclick="go('做一个贪吃蛇Chrome扩展小游戏')"><span>🎮</span>Chrome小游戏</div>
                <div class="tpl" onclick="go('帮我做一个Markdown实时预览编辑器')"><span>📝</span>Markdown编辑器</div>
                <div class="tpl" onclick="go('做一个简洁的个人博客首页')"><span>🌐</span>个人网站</div>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <div class="terminal">
                <div class="terminal-header">
                    <div class="dots"><span></span><span></span><span></span></div>
                    <span>DeepForge — 7 Agents Working</span>
                    <span style="margin-left:auto" id="elapsed"></span>
                </div>
                <div class="terminal-body" id="logs"></div>
            </div>
            <div class="preview-area" id="preview">
                <div class="preview-bar">
                    <span>产出物预览</span>
                    <a href="#" id="previewLink" target="_blank">在新窗口打开 ↗</a>
                </div>
                <iframe class="preview-frame" id="previewFrame"></iframe>
            </div>
            <div class="detail-toggle" id="detailToggle" onclick="toggleDetail()">▼ 查看Agent详细输出</div>
            <div class="detail-panel" id="detailPanel"><pre id="detailContent"></pre></div>
        </div>

        <div class="input-area">
            <textarea class="input-field" id="input" placeholder="描述你想创建的东西... Enter发送" rows="1"></textarea>
            <button class="send-btn" id="btn" onclick="send()">开始</button>
        </div>
    </div>

<script>
const sid=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36);
let ws,busy=false,t0=0,timer=null,details=[];
const AGENTS={project_manager:['PM','pm'],product_manager:['PD','pd'],architect:['Arch','arch'],engineer:['Eng','eng'],reviewer:['Rev','rev'],crowd_user:['QA','crowd'],memory_keeper:['Mem','mem']};

function connect(){
    const p=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(`${p}//${location.host}/ws/${sid}`);
    ws.onopen=()=>{$('dot').classList.remove('off');$('st').textContent='ready';fetch('/api/status').then(r=>r.json()).then(d=>$('mdl').textContent=d.model||'')};
    ws.onclose=()=>{$('dot').classList.add('off');$('st').textContent='offline';setTimeout(connect,3000)};
    ws.onmessage=e=>{
        const d=JSON.parse(e.data);
        if(d.type==='agent_message'){
            const [label,cls]=AGENTS[d.sender]||[d.sender,''];
            if(d.msg_type!=='handoff'&&d.summary){
                log(label,cls,d.summary);
            }
            details.push({sender:d.sender,content:d.content});
            $('detailContent').textContent=details.map(x=>`[${x.sender}]\n${x.content}\n`).join('\n---\n');
            if(d.has_files){
                log('SYS','info','📁 文件已生成，准备预览...');
                setTimeout(()=>showPreview(d.content),500);
            }
        }else if(d.type==='status'){
            if(d.content==='processing'){start()}
            else if(d.content==='done'){done()}
        }else if(d.type==='error'){
            log('ERR','',d.content,'error');
            busy=false;$('btn').disabled=false;
        }
    };
}

function log(agent,cls,msg,type=''){
    const el=$('logs'),div=document.createElement('div');
    div.className='log-line'+(type?' '+type:'');
    const t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    div.innerHTML=`<span class="log-time">${t}</span><span class="log-agent ${cls}">${agent}</span><span class="log-msg">${esc(msg)}</span>`;
    el.appendChild(div);el.scrollTop=el.scrollHeight;
}

function start(){
    busy=true;$('btn').disabled=true;$('btn').textContent='工作中...';
    $('welcome').style.display='none';$('workspace').classList.add('show');
    details=[];$('detailContent').textContent='';
    $('preview').classList.remove('show');
    t0=Date.now();tick();
    log('SYS','info','🚀 任务启动，7个Agent开始协作...','info');
}

function done(){
    busy=false;$('btn').disabled=false;$('btn').textContent='开始';
    if(timer)clearInterval(timer);
    const s=((Date.now()-t0)/1000).toFixed(0);
    log('SYS','info',`✅ 完成！耗时 ${s}s`,'success');
}

function showPreview(content){
    const m=content.match(/```filepath:([^\n]+\.html)\n([\s\S]*?)```/);
    if(!m)return;
    const html=m[2];
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    $('previewFrame').src=url;
    $('previewLink').href=url;
    $('preview').classList.add('show');
    log('SYS','info','🎉 预览已就绪！','success');
}

function toggleDetail(){
    const p=$('detailPanel');p.classList.toggle('show');
    $('detailToggle').textContent=p.classList.contains('show')?'▲ 收起详细输出':'▼ 查看Agent详细输出';
}

function tick(){timer=setInterval(()=>{const s=((Date.now()-t0)/1000).toFixed(0);$('elapsed').textContent=s+'s'},1000)}
function send(){const el=$('input'),t=el.value.trim();if(!t||busy||!ws||ws.readyState!==1)return;ws.send(JSON.stringify({message:t}));el.value='';el.style.height='auto'}
function go(t){$('input').value=t;send()}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function $(id){return document.getElementById(id)}
$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
$('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});
connect();
</script>
</body>
</html>
