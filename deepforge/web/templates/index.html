<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Educe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--border:#262626;--text:#e5e5e5;--text2:#a3a3a3;--accent:#a78bfa}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border)}
nav .brand{font-size:16px;font-weight:600;color:var(--accent)}
nav .model{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
nav .model::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.hero{text-align:center;max-width:500px}
.hero h2{font-size:22px;font-weight:400;color:var(--text);margin-bottom:8px}
.hero p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:40px}
.examples button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.examples button:hover{border-color:var(--accent);color:var(--accent)}
.input-area{position:fixed;bottom:0;left:0;right:0;padding:16px 24px 24px;background:var(--bg)}
.input-wrap{max-width:640px;margin:0 auto;position:relative}
.input-wrap textarea{width:100%;padding:12px 48px 12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;resize:none;outline:none;line-height:1.5}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap button{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:16px;cursor:pointer}
#messages{max-width:640px;width:100%;margin:0 auto;padding:80px 0 120px}
.msg{margin-bottom:16px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6}
.msg.user{background:var(--surface);border:1px solid var(--border);margin-left:20%}
.msg.ai{background:transparent;color:var(--text)}
.msg.system{background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.15);font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<nav>
  <span class="brand">Educe</span>
  <span class="model" id="model-name">connecting...</span>
</nav>
<div class="main" id="welcome">
  <div class="hero">
    <h2>Educe</h2>
    <p>说出你想做的事，Educe 帮你执行并验证。<br>遇到问题会自动修复，搞不定会诚实告诉你。</p>
  </div>
  <div class="examples">
    <button onclick="qs('帮我写一个 Python 脚本统计当前目录文件大小')">统计文件大小</button>
    <button onclick="qs('用 pandas 处理 CSV 算每列平均值')">处理 CSV</button>
    <button onclick="qs('做一个 Flask 待办 API 能增删改查')">Flask API</button>
  </div>
</div>
<div id="messages" style="display:none"></div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="说出你想做的事..."></textarea>
    <button onclick="send()">➤</button>
  </div>
</div>
<script>
const msgEl=document.getElementById('messages'),welcomeEl=document.getElementById('welcome'),inputEl=document.getElementById('input');
let ws,sid=localStorage.getItem('educe_sid')||crypto.randomUUID();
localStorage.setItem('educe_sid',sid);

function connect(){
  ws=new WebSocket(`ws://${location.host}/ws/${sid}`);
  ws.onopen=()=>{fetch('/api/status').then(r=>r.json()).then(d=>{document.getElementById('model-name').textContent=d.model||'ready'}).catch(()=>{})};
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='chunk'&&msg.content){addMsg('ai',msg.content)}
    if(msg.type==='agent_message'){addMsg('system',msg.content)}
    if(msg.type==='action_confirm_request'){
      ws.send(JSON.stringify({type:'action_confirm_response',decision:'confirm',note:''}));
    }
  };
  ws.onclose=()=>setTimeout(connect,2000);
}
connect();

function addMsg(role,text){
  welcomeEl.style.display='none';msgEl.style.display='block';
  const d=document.createElement('div');d.className='msg '+role;d.textContent=text;
  msgEl.appendChild(d);msgEl.scrollTop=msgEl.scrollHeight;
}

function send(){
  const v=inputEl.value.trim();if(!v)return;
  addMsg('user',v);ws.send(JSON.stringify({message:v}));inputEl.value='';
}
function qs(t){inputEl.value=t;send()}
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
</script>
</body>
</html>
