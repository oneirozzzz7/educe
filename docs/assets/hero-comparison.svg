<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#0d1117" rx="12"/>

  <!-- Divider line -->
  <line x1="400" y1="40" x2="400" y2="280" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Left side: Without Educe -->
  <text x="200" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#f0f6fc" text-anchor="middle">Without Educe</text>

  <!-- 7 blocks representing 7 LLM calls -->
  <rect x="60" y="80" width="50" height="50" rx="6" fill="#da3633" opacity="0.9"/>
  <rect x="120" y="80" width="50" height="50" rx="6" fill="#da3633" opacity="0.85"/>
  <rect x="180" y="80" width="50" height="50" rx="6" fill="#e36209" opacity="0.9"/>
  <rect x="240" y="80" width="50" height="50" rx="6" fill="#e36209" opacity="0.85"/>
  <rect x="100" y="140" width="50" height="50" rx="6" fill="#da3633" opacity="0.8"/>
  <rect x="160" y="140" width="50" height="50" rx="6" fill="#e36209" opacity="0.8"/>
  <rect x="220" y="140" width="50" height="50" rx="6" fill="#da3633" opacity="0.75"/>

  <!-- Labels on blocks -->
  <text x="85" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="145" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="205" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="265" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="125" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="185" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>
  <text x="245" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">LLM</text>

  <!-- Left stats -->
  <text x="200" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">7 LLM calls</text>
  <text x="200" y="252" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f85149" text-anchor="middle">9,700 tokens</text>

  <!-- Right side: With Educe -->
  <text x="600" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#f0f6fc" text-anchor="middle">With Educe</text>

  <!-- 2 blocks representing 2 LLM calls -->
  <rect x="545" y="100" width="55" height="55" rx="6" fill="#238636" opacity="0.9"/>
  <rect x="615" y="100" width="55" height="55" rx="6" fill="#1f6feb" opacity="0.9"/>

  <!-- Labels on blocks -->
  <text x="572" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="white" text-anchor="middle">LLM</text>
  <text x="642" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="white" text-anchor="middle">LLM</text>

  <!-- Right stats -->
  <text x="600" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">2 LLM calls</text>
  <text x="600" y="222" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#3fb950" text-anchor="middle">2,400 tokens</text>

  <!-- Bottom center: cost reduction -->
  <rect x="280" y="278" width="240" height="32" rx="16" fill="#238636" opacity="0.15"/>
  <rect x="280" y="278" width="240" height="32" rx="16" fill="none" stroke="#238636" stroke-width="1"/>
  <text x="400" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#3fb950" text-anchor="middle">75% cost reduction</text>
</svg>